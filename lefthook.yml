pre-commit:
  parallel: true
  jobs:
    - name: check
      run: pnpm rr check --fix-staged
      stage_fixed: true

    - name: tsc
      run: pnpm rr pkgs --files {staged_files} --decorator turbo | xargs pnpm test:types
      glob:
        - "*.{ts,tsx}"
        - "tsconfig.json"

pre-push:
  jobs:
    - name: test
      run: |
        branch="$(git branch --show-current)"

        if [ "$branch" = "main" ]; then
          pnpm test --filter='...[HEAD^]'
        else
          pnpm test --affected
        fi
